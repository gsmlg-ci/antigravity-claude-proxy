services:
  antigravity-claude-proxy:
    image: ghcr.io/gsmlg-dev/antigravity-claude-proxy:latest
    container_name: antigravity-claude-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - antigravity-proxy-data:/home/node/.antigravity-claude-proxy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  antigravity-proxy-data:
