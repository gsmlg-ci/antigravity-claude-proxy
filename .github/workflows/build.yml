name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*"
  release:
    types:
      - published

env:
  IMAGE_NAME: ghcr.io/gsmlg-ci/antigravity-claude-proxy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v4

      - name: Checkout upstream app source
        uses: actions/checkout@v4
        with:
          repository: badrisnarayanan/antigravity-claude-proxy
          ref: main
          path: upstream
          fetch-depth: 1

      # Copy our custom source files into the upstream tree and patch server.js
      - name: Overlay custom source files
        run: |
          set -euo pipefail

          # 1. Copy the model-aliases module
          cp -v src/model-aliases.js upstream/src/model-aliases.js

          # 2. Patch upstream/src/server.js to integrate model aliases
          SERVER=upstream/src/server.js

          # 2a. Add import after the last existing import line
          sed -i "/^import usageStats/a\\
          import { modelAliasMiddleware, augmentModelsResponse } from './model-aliases.js';" "$SERVER"

          # 2b. Mount middleware right after express.json()
          sed -i "/app\.use(express\.json/a\\
          app.use(modelAliasMiddleware);" "$SERVER"

          # 2c. Wrap /v1/models response with alias augmentation
          sed -i 's/res\.json(models);/res.json(augmentModelsResponse(models));/' "$SERVER"

          echo "--- Patched server.js (first 30 lines) ---"
          head -30 "$SERVER"
          echo "--- grep model-aliases ---"
          grep -n 'model-aliases\|modelAlias\|augmentModels' "$SERVER" || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive release tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event_name == 'release' }}
            type=ref,event=tag
            type=raw,value=${{ steps.vars.outputs.release_tag }},enable=${{ steps.vars.outputs.release_tag != '' }}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title=antigravity-claude-proxy
            org.opencontainers.image.description=Anthropic-compatible proxy server for Antigravity Cloud Code
            org.opencontainers.image.vendor=gsmlg-ci

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
